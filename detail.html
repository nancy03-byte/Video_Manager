<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Details</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header with Back Button -->
        <header class="header">
            <button class="btn btn-back" id="backBtn">← Back to Library</button>
            <h1 id="starTitle">Star Details</h1>
            <div class="header-buttons">
                <button class="btn btn-edit" id="editStarBtn">Edit Star</button>
                <button class="btn btn-delete-star" id="deleteStarBtn">Delete Star</button>
            </div>
        </header>

        <!-- Star Info Section -->
        <div class="star-detail-info">
            <img id="starImage" src="" alt="Star" class="star-detail-image">
            <div class="star-detail-text">
                <h2 id="starName"></h2>
                <p id="movieCount"></p>
            </div>
        </div>

        <!-- Movie Filters -->
        <div class="filters-section">
            <div class="filter-group search-group">
                <label for="movieSearchInput">Search Movies:</label>
                <input type="text" id="movieSearchInput" placeholder="Search by movie title or site">
            </div>

            <div class="filter-group">
                <label for="movieSiteFilter">Filter by Site:</label>
                <select id="movieSiteFilter" multiple size="4"></select>
            </div>

            <div class="filter-group">
                <label for="movieSortSelect">Sort Movies:</label>
                <select id="movieSortSelect">
                    <option value="insertion-asc">Insertion order: Oldest first</option>
                    <option value="insertion-desc">Insertion order: Newest first</option>
                    <option value="title-asc">Alphabetic: A to Z</option>
                    <option value="title-desc">Alphabetic: Z to A</option>
                    <option value="site-asc">Site name: A to Z</option>
                    <option value="site-desc">Site name: Z to A</option>
                </select>
            </div>

            <button class="btn btn-reset" id="resetMovieFiltersBtn">Reset Movie Filters</button>
        </div>

        <!-- Movies Grid -->
        <div class="movies-section">
            <div class="movies-section-header">
                <h3>Movies</h3>
                <div class="movies-section-actions">
                    <label class="movies-per-row-control" for="movieColumnsSelect">
                        <span>Per row</span>
                        <select id="movieColumnsSelect">
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5" selected>5</option>
                            <option value="6">6</option>
                        </select>
                    </label>
                    <button class="btn btn-add" id="addMovieBtn">+ Add Movie</button>
                    <button class="btn btn-slideshow-toggle" id="toggleSlideshowsBtn" type="button">Stop Slides</button>
                </div>
            </div>
            <div class="movies-grid" id="moviesGrid">
                <!-- Movies will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Add Movie Modal -->
    <div class="modal" id="addMovieModal">
        <div class="modal-content">
            <span class="close" id="closeMovieModal">&times;</span>
            <h2>Add New Movie</h2>
            <form id="addMovieForm">
                <div class="form-group">
                    <label for="movieTitle">Video Title: <span style="color: red;">*</span></label>
                    <input type="text" id="movieTitle" required>
                </div>
                <div class="form-group">
                    <label for="siteName">Site Name: <span style="color: red;">*</span></label>
                    <input type="text" id="siteName" required>
                </div>
                <div class="form-group">
                    <label for="movieImages">Movie Images (comma-separated URLs):</label>
                    <textarea id="movieImages" placeholder="https://image1.jpg, https://image2.jpg, https://image3.jpg" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="previewVideoUrl">Preview Video URL:</label>
                    <input type="url" id="previewVideoUrl" placeholder="https://preview.mp4">
                </div>
                <div class="form-group">
                    <label for="videoUrl">Watch Video URLs (comma-separated):</label>
                    <textarea id="videoUrl" placeholder="https://video1.html, https://video2.html" rows="2"></textarea>
                </div>
                <button type="submit" class="btn btn-submit">Add Movie</button>
            </form>
        </div>
    </div>

    <!-- Edit Star Modal -->
    <div class="modal" id="editStarModal">
        <div class="modal-content">
            <span class="close" id="closeEditStarModal">&times;</span>
            <h2>Edit Star Profile</h2>
            <form id="editStarForm">
                <div class="form-group">
                    <label for="editStarName">Star Name:</label>
                    <input type="text" id="editStarName" required>
                </div>
                <div class="form-group">
                    <label for="editStarPictureUrl">Picture URL:</label>
                    <input type="url" id="editStarPictureUrl" required>
                </div>
                <button type="submit" class="btn btn-submit">Save Changes</button>
            </form>
        </div>
    </div>

    <script src="detail.js"></script>
</body>
</html>
